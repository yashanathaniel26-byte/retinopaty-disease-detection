services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/onnx/retinal_classifier_efficientnet_b1.onnx
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request, sys; url='http://localhost:8000/health';\ntry: urllib.request.urlopen(url, timeout=3).read(); sys.exit(0)\nexcept Exception: sys.exit(1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - MODEL_PATH=/app/models/onnx/retinal_classifier_efficientnet_b1.onnx
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend/app:/app/app
      - ./models:/app/models:ro
    profiles: ["dev"]
